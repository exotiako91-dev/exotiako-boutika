:root {
  --dark: #1f160f;
  --brown: #6b3f20;
  --orange: #f59b2e;
  --cream: #fff7e8;
  --white: #ffffff;
  --muted: #766b61;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin: 0; background: var(--cream); color: var(--dark); }
a { color: inherit; text-decoration: none; }
button, input, textarea { font: inherit; }
button { cursor: pointer; }

.hero {
  min-height: 76vh;
  background:
    linear-gradient(90deg, rgba(31, 22, 15, 0.85), rgba(31, 22, 15, 0.35)),
    url('/images/hero.svg') center/cover no-repeat;
  color: white;
  padding: 24px clamp(18px, 4vw, 64px);
}

.navbar { display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.04em; }
.logo span { color: var(--orange); }
.nav-button {
  border: 1px solid rgba(255,255,255,.5);
  padding: 10px 18px;
  border-radius: 999px;
  backdrop-filter: blur(8px);
}
.hero-content { max-width: 680px; padding: 13vh 0 8vh; }
.badge {
  display: inline-flex;
  background: rgba(245, 155, 46, .2);
  border: 1px solid rgba(245, 155, 46, .45);
  border-radius: 999px;
  padding: 8px 14px;
}
.hero h1 { font-size: clamp(3.5rem, 10vw, 7rem); margin: 18px 0 8px; line-height: .9; }
.hero p { font-size: 1.25rem; line-height: 1.6; }
.primary-button {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  border: 0;
  border-radius: 16px;
  background: var(--orange);
  color: #24170b;
  padding: 14px 22px;
  font-weight: 800;
  box-shadow: 0 12px 30px rgba(108, 57, 16, .24);
}
.primary-button.full { width: 100%; }
.primary-button:disabled { opacity: .65; cursor: not-allowed; }

.section { padding: 64px clamp(18px, 4vw, 64px); }
.section-title { text-align: center; margin-bottom: 32px; }
.section-title p { color: var(--orange); font-weight: 800; text-transform: uppercase; letter-spacing: .1em; }
.section-title h2 { font-size: clamp(2rem, 5vw, 3.5rem); margin: 0; }
.layout { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 28px; align-items: start; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; }
.product-card, .detail-card, .cart-card, .form-card {
  background: rgba(255,255,255,.9);
  border: 1px solid rgba(107, 63, 32, .12);
  border-radius: 28px;
  box-shadow: 0 16px 45px rgba(71, 41, 18, .08);
}
.product-card {
  padding: 16px;
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 14px;
  align-items: center;
  transition: .2s ease;
}
.product-card:hover, .product-card.active { transform: translateY(-3px); border-color: var(--orange); }
.product-card img { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; background: #fff0d2; }
.product-card span, .detail-card span { color: var(--muted); font-size: .9rem; }
.product-card h3 { margin: 5px 0; }
.product-card p { margin: 0; font-weight: 900; color: var(--brown); }
.detail-card { padding: 22px; position: sticky; top: 16px; }
.detail-card img { width: 100%; aspect-ratio: 1.1; object-fit: cover; border-radius: 24px; background: #fff0d2; }
.detail-card h2 { margin-bottom: 8px; }
.detail-card p { color: var(--muted); line-height: 1.6; }
.detail-card strong { display: block; font-size: 1.6rem; color: var(--brown); margin-bottom: 16px; }
.quantity-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin: 18px 0; }
.quantity-row input, .cart-item input { width: 82px; padding: 10px; border-radius: 12px; border: 1px solid #e7d9c3; }
.order-section { display: grid; grid-template-columns: 1.2fr .8fr; gap: 24px; padding-top: 20px; }
.cart-card, .form-card { padding: 24px; }
.empty { color: var(--muted); }
.cart-list { display: grid; gap: 12px; }
.cart-item { display: grid; grid-template-columns: 1fr 80px 110px auto; gap: 12px; align-items: center; border-bottom: 1px solid #f0dfc7; padding-bottom: 12px; }
.cart-item h3, .cart-item p { margin: 0; }
.cart-item p { color: var(--muted); }
.cart-item button { border: 0; background: #fee7d8; color: #8f2d12; border-radius: 12px; padding: 10px 12px; }
.total-row { display: flex; justify-content: space-between; align-items: center; margin-top: 22px; font-size: 1.25rem; }
.form-card { display: grid; gap: 12px; }
.form-card input, .form-card textarea {
  width: 100%;
  border: 1px solid #e7d9c3;
  border-radius: 14px;
  padding: 14px;
  background: #fffaf1;
}
.form-card textarea { min-height: 110px; resize: vertical; }
.status { background: #fff1ce; border-radius: 14px; padding: 12px; margin: 0; }
footer { text-align: center; padding: 28px; color: var(--muted); }

@media (max-width: 900px) {
  .layout, .order-section { grid-template-columns: 1fr; }
  .detail-card { position: static; }
  .cart-item { grid-template-columns: 1fr; }
}
